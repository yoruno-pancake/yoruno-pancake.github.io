<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF6 COMBO MEMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Webフォントは描画をブロックしないよう遅延適用（未取得の間はシステムフォントで即表示） -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet"></noscript>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#1b2733;--bg2:#22303d;--bg3:#2c3e50;--bg4:#34495e;--bd:#3a4d61;--bd2:#4a5f76;--gold:#f47b20;--text:#ecf0f1;--muted:#c3ccd5;--dim:#9aa6b4;--hit:#2ecc71;--blk:#e74c3c;}
html,body{width:100%;height:100%;background:#050508;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP','Segoe UI',system-ui,sans-serif;}
#scaleRoot{width:1400px;height:800px;transform-origin:top left;position:absolute;}
.app{background:var(--bg);color:var(--text);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;width:100%;height:100%;border:1px solid var(--bd);}
.topbar{background:var(--bg2);border-bottom:2px solid var(--gold);padding:6px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:nowrap;overflow:hidden;}
.app-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:2px;font-style:italic;white-space:nowrap;}
.topbar-sep{width:1px;height:20px;background:var(--bd2);flex-shrink:0;}
.topbar-actions{display:contents;}        /* PCでは透過し、従来どおり横並び。モバイルでのみ折りたたみ対象 */
.topbar-menu-btn{display:none;}            /* メニュー開閉ボタンはモバイルのみ表示 */
.topbar-settings-mobile{display:none;}     /* 設定ボタン(モバイル用)はPCでは非表示。PCは右グループ内のボタンを使う */
/* 改善6: 操作ボタンを役割ごとにまとめる薄い枠（PCのみ）。モバイルは display:contents で従来のグリッドに溶かす */
.tb-group{display:flex;align-items:center;gap:6px;padding:3px 7px;border:1px solid var(--bd);border-radius:8px;background:rgba(255,255,255,.025);}
.tb-group.tb-right{margin-left:auto;}
body.mobile .tb-group{display:contents;}
/* 未保存の変更インジケータ */
.unsaved-dot{display:none;width:8px;height:8px;border-radius:50%;background:#f4c20d;box-shadow:0 0 6px rgba(244,194,13,.9);flex-shrink:0;}
.unsaved-dot.show{display:inline-block;}
body.mobile .unsaved-dot{display:none!important;}
.char-select,.form-inp,select{background:var(--bg3);border:1px solid var(--bd2);color:var(--text);font-size:12px;padding:4px 8px;border-radius:6px;outline:none;font-family:inherit;}
.char-select:focus,.form-inp:focus{border-color:var(--gold);}
select option{background:var(--bg3);}
.btn{background:var(--bg3);border:1px solid var(--bd2);color:var(--text);font-size:11px;padding:4px 9px;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:border-color .15s,background .15s;}
.btn:hover{border-color:var(--gold);background:var(--bg4);}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:#2e1c08;}
.btn.danger{border-color:#5a1a1a;color:#ff6666;}.btn.danger:hover{border-color:#ff4444;background:#2a1a1a;}
.btn.green{border-color:#1e7d52;color:#2ecc71;}.btn.green:hover{border-color:#2ecc71;background:#16352a;}
.btn.special{border-color:#e74c3c;color:#e74c3c;}.btn.special:hover{border-color:#e74c3c;background:#3a1513;}
.main{display:flex;flex:1;min-height:0;}
.left{width:260px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;min-height:0;}
.panel-hdr{font-size:10px;letter-spacing:2px;color:var(--gold);padding:6px 10px 5px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sort-bar{padding:5px 7px;border-bottom:1px solid #1e1e2e;display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0;align-items:center;}
.sort-pill{font-size:10px;padding:3px 7px;border-radius:8px;cursor:pointer;border:1px solid transparent;background:var(--bg3);color:var(--muted);transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.sort-pill.active{background:#2a1800;border-color:#ff8030;}
.move-list-wrap{overflow-y:auto;flex:1;padding:5px;}
/* ★ 技カード: サムネ大きく16:9表示 */
.move-card{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:6px 8px;cursor:grab;display:flex;flex-direction:column;user-select:none;margin-bottom:5px;transition:border-color .15s,background .15s;position:relative;}
@media(hover:hover){body:not(.mobile) .move-card:hover{border-color:var(--gold);background:var(--bg4);}}
/* モバイル表示では :hover の張り付きで金枠が残らないよう明示的に無効化 */
body.mobile:not(.adding) .move-card:hover{border-color:var(--bd);background:var(--bg3);}
.move-card.dragging{opacity:.4;}
/* 改善3: ドラッグ可能であることを示すグリップ（PC専用）。サムネ右上にうっすら常時表示 */
.move-card-grip{position:absolute;top:7px;left:7px;z-index:2;color:#cdd6df;font-size:13px;line-height:1;background:rgba(8,12,18,.55);border-radius:4px;padding:1px 4px;cursor:grab;opacity:.7;transition:opacity .15s,color .15s;}
.move-card:hover .move-card-grip{opacity:1;color:var(--gold);}
body.mobile .move-card-grip{display:none;}
.move-card-img{width:100%;aspect-ratio:16/9;border-radius:5px;object-fit:cover;display:block;margin-bottom:4px;}
.move-card-ph{width:100%;aspect-ratio:16/9;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-bottom:4px;}
/* 改善5: コンパクト（リスト）表示 — サムネを省いて技名＋コマンドを詰めて表示 */
body.compact-moves .move-card{padding:6px 9px;}
body.compact-moves .move-card-img,body.compact-moves .move-card-ph{display:none;}
body.compact-moves .move-card .m-row{margin-top:1px!important;}
body.compact-moves .move-card-grip{display:none;}
.m-row{display:flex;align-items:center;gap:5px;}
.m-name{font-size:11px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-type-lbl{font-size:10px;}
.m-dg{font-size:10px;color:#54d873;}
.m-edit-btn{background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;padding:2px 3px;border-radius:3px;flex-shrink:0;transition:color .15s;}
.m-edit-btn:hover{color:var(--gold);}
.right{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;}
.tab{padding:9px 18px;font-size:12px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;letter-spacing:.5px;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
/* MOVE LIST の見出し文字を COMBO LIST タブと同じ書式に揃える */
.move-list-title{font-size:12px;letter-spacing:.5px;color:var(--gold);}
.tab:hover:not(.active){color:var(--text);}
.tab-view{display:none;flex:1;flex-direction:column;min-height:0;}
.tab-view.active{display:flex;}
.filter-bar{padding:6px 10px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.tag-pill{font-size:10px;padding:2px 7px;border-radius:10px;cursor:pointer;border:1px solid transparent;user-select:none;transition:all .15s;}
.combo-scroll{overflow-y:auto;flex:1;}
.combo-area{padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
.combo-block{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:9px;position:relative;}
/* ★ 分岐: 階層に応じた左インデント + 親への接続線 */
.combo-block.is-branch{border-left:2px solid rgba(244,123,32,.45);}
/* ★ 親へつながるコネクタを「↳」グリフで表示（インデント内に配置） */
.combo-block.is-branch::before{content:"↳";position:absolute;left:-16px;top:0;color:rgba(244,123,32,.7);font-size:18px;line-height:1;pointer-events:none;}
/* ★ 差分表示: 親と共通の技は淡色、分岐後の技はゴールド強調 */
.placed.placed-common{opacity:.6;}
.placed.placed-branch{border-color:rgba(244,123,32,.7);box-shadow:inset 0 0 0 1px rgba(244,123,32,.3);}
.branch-split-sep{color:var(--gold);font-size:11px;font-weight:700;flex-shrink:0;display:flex;align-items:center;gap:2px;white-space:nowrap;}
.branch-legend{font-size:9px;color:var(--dim);margin:0 0 4px 2px;display:flex;align-items:center;gap:8px;}
.branch-legend .lg-dot{display:inline-flex;align-items:center;gap:3px;}
.branch-legend .lg-sw{width:9px;height:9px;border-radius:2px;display:inline-block;}
.branch-nodiff{font-size:9px;color:rgba(244,123,32,.85);margin:0 0 4px 2px;}
.combo-hdr{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.combo-name-inp{background:none;border:none;border-bottom:1px solid var(--bd);color:var(--text);font-size:13px;font-weight:600;padding:2px 4px;outline:none;width:120px;font-family:inherit;transition:border-color .15s;}
.combo-name-inp:focus{border-bottom-color:var(--gold);}
.lbl-sm{font-size:10px;color:var(--muted);white-space:nowrap;}
.combo-dmg-inp{background:var(--bg3);border:1px solid var(--bd);color:var(--gold);font-size:12px;font-weight:700;padding:2px 5px;border-radius:5px;outline:none;width:65px;font-family:inherit;text-align:center;}
.combo-dmg-inp:focus{border-color:var(--gold);}
.combo-frame-inp{background:var(--bg3);border:1px solid var(--bd);color:#6fd0e6;font-size:12px;font-weight:700;padding:2px 5px;border-radius:5px;outline:none;width:55px;font-family:inherit;text-align:center;}
.combo-frame-inp:focus{border-color:var(--gold);}
.combo-dg-disp{background:var(--bg3);border:1px solid var(--bd);color:#2ecc71;font-size:12px;font-weight:700;padding:2px 6px;border-radius:5px;min-width:44px;text-align:center;}
.combo-dg-disp.manual{border-color:var(--gold);}
.combo-dg-inp{background:var(--bg3);border:1px solid var(--bd);color:#2ecc71;font-size:12px;font-weight:700;padding:2px 5px;border-radius:5px;outline:none;width:48px;font-family:inherit;text-align:center;}
.combo-dg-inp:focus{border-color:var(--gold);}
.combo-tags-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:5px;}
.ctag{font-size:10px;padding:2px 6px;border-radius:8px;cursor:pointer;user-select:none;}
.drop-zone{border:1.5px dashed var(--bd);border-radius:8px;min-height:48px;padding:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;transition:border-color .15s,background .15s;}
.drop-zone.drag-over{border-color:var(--gold);background:#2a1c0a;}
.drop-hint{font-size:12px;color:#6f6f82;margin-left:4px;}
.placed{background:var(--bg4);border:1px solid var(--bd2);border-radius:6px;padding:3px 5px;display:flex;align-items:center;gap:4px;cursor:grab;user-select:none;transition:border-color .15s;position:relative;}
.placed:hover{border-color:var(--gold);}
.placed.dragging{opacity:.4;}
/* ★ ドラッグ中の挿入位置インジケータ（ゴールドの縦キャレット） */
.placed.ins-l::before,.placed.ins-r::before{content:"";position:absolute;top:-2px;bottom:-2px;width:3px;background:var(--gold);border-radius:2px;box-shadow:0 0 5px var(--gold);pointer-events:none;z-index:2;}
.placed.ins-l::before{left:-4px;}
.placed.ins-r::before{right:-4px;}
.rm-btn{width:14px;height:14px;background:#3a1a1a;border:none;border-radius:50%;color:#ff4444;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.dup-btn{width:14px;height:14px;background:#2e2410;border:none;border-radius:50%;color:var(--gold);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.arrow-sep{color:var(--dim);font-size:11px;flex-shrink:0;}
/* ★ ヒット状況: カウンター(C)=黄, パニッシュカウンター(PC)=橙。編集中はトグルボタン、非編集中はバッジ表示 */
.ctr-btn,.ctr-badge{flex-shrink:0;border-radius:4px;font-size:9px;font-weight:700;line-height:1;padding:2px 4px;min-width:18px;height:16px;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;}
.ctr-btn{border:none;cursor:pointer;font-family:inherit;}
.ctr-none{background:#2c3a47;color:#7f8c9d;}
.ctr-c{background:#f4c20d;color:#fff;}
.ctr-pc{background:#f47b20;color:#fff;}
.ctr-d{background:#9b59b6;color:#fff;}
.ctr-g{background:#2980b9;color:#fff;}
/* STARTER TREE の技チップ内に出す小型のヒット状況バッジ（色は ctr-c / ctr-pc / ctr-d を流用） */
.tree-chip-ctr{display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;line-height:1;padding:1px 3px;border-radius:3px;margin-left:4px;vertical-align:middle;}
.add-combo-btn{background:#2a1c0a;border:1.5px dashed #8a5a1e;border-radius:7px;color:#d6a05a;font-size:12px;font-weight:600;padding:8px;cursor:pointer;width:100%;font-family:inherit;transition:border-color .15s,color .15s,background .15s;}
.add-combo-btn:hover{border-color:var(--gold);color:var(--gold);background:#332408;}
.bottom-bar{padding:7px 10px;border-top:1px solid #1e1e2e;flex-shrink:0;}
.no-combos{color:var(--dim);font-size:12px;text-align:center;padding:24px 0;}
.tree-view-wrap{flex:1;overflow:auto;padding:14px;}
.tree-root{display:flex;flex-direction:column;gap:16px;}
.tree-starter-block{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.tree-starter-hdr{background:var(--bg3);padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);}
.tree-starter-name{font-size:13px;font-weight:700;color:var(--gold);}
.tree-combos{padding:8px 12px;display:flex;flex-direction:column;gap:5px;}
.tree-combo-row{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;background:var(--bg4);border-radius:7px;border:1px solid var(--bd);}
.tree-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}
.tree-line{width:2px;background:var(--bd2);flex:1;min-height:8px;margin:2px auto;}
.tree-combo-content{flex:1;min-width:0;}
.tree-combo-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;}
.tree-combo-moves{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.tree-move-chip{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap;cursor:pointer;transition:filter .15s,box-shadow .15s;}
.tree-move-chip:hover{filter:brightness(1.18);box-shadow:0 0 0 1.5px var(--gold);}
/* ★ ツリービューの差分表示：親と共通=淡色、分岐後=ゴールドのリング */
.tree-move-chip.tmc-common{opacity:.6;}
.tree-move-chip.tmc-branch{box-shadow:0 0 0 1.5px rgba(244,123,32,.7);}
.rep-x{font-weight:700;margin-left:2px;font-size:10px;}
.placed .rep-x{color:var(--gold);}
.tree-diff-legend{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--dim);margin:0 0 10px 2px;}
.tree-diff-legend .lg-dot{display:inline-flex;align-items:center;gap:4px;}
.tree-diff-legend .lg-sw{width:10px;height:10px;border-radius:3px;display:inline-block;}
/* ヒット状況の凡例は2列グリッドにし、C/PC を1行目・D/G を2行目に置く。
   これでパニッシュカウンターの後で改行され、カウンター(C)とディレイ(D)が左列で縦に揃う */
.tree-hit-legend{align-items:start;}
.tree-hit-legend .lg-grid{display:grid;grid-template-columns:auto auto;gap:4px 14px;}
.tree-hit-legend .lg-grid .lg-dot{display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.tree-combo-meta{display:flex;gap:8px;margin-top:3px;}
.tree-meta-item{font-size:10px;color:var(--muted);}
.tree-meta-item span{color:var(--gold);}
.tree-meta-item.dg span{color:#2ecc71;}
.tree-tag{font-size:9px;padding:1px 5px;border-radius:5px;margin-right:3px;}
/* ★ モーダルサムネ大きく16:9 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:var(--bg2);border-radius:12px;padding:18px;width:460px;max-height:90vh;overflow-y:auto;color:var(--text);max-width:95vw;border:1px solid var(--bd2);}
.modal-title-bar{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:1px;}
.modal-thumb-lg{width:100%;aspect-ratio:16/9;border-radius:8px;object-fit:cover;display:block;margin-bottom:10px;}
.modal-thumb-lg-ph{width:100%;aspect-ratio:16/9;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;margin-bottom:10px;text-align:center;padding:10px;box-sizing:border-box;line-height:1.3;word-break:break-word;overflow-wrap:anywhere;}
.modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;border-bottom:1px solid var(--bd);padding-bottom:10px;}
.stats-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;}
.sbox{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:7px 5px;text-align:center;}
.slbl{font-size:10px;color:#9a9aa8;letter-spacing:1px;}.sval{font-size:15px;font-weight:700;color:var(--gold);margin-top:2px;}.sunit{font-size:9px;color:#8a8a98;}
.drow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a2a;font-size:12px;}
.dkey{color:var(--muted);}.dhit{color:var(--hit);}.dblk{color:var(--blk);}.dg-val{color:#2ecc71;}
.drow-stack{display:block;padding:6px 0;border-bottom:1px solid #1a1a2a;font-size:12px;}
.drow-stack .dkey{display:block;margin-bottom:3px;}
.dval-long{display:block;text-align:left;line-height:1.6;white-space:normal;overflow-wrap:anywhere;word-break:normal;}
.close-btn{width:100%;background:var(--bg4);border:1px solid var(--bd2);border-radius:7px;color:var(--text);padding:8px;cursor:pointer;margin-top:10px;font-size:12px;font-family:inherit;transition:border-color .15s;}
.close-btn:hover{border-color:var(--gold);}
.form-group{margin-bottom:10px;min-width:0;}
.form-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;display:block;}
.form-inp{width:100%;padding:6px 9px;font-size:12px;}
.form-inp[type=number]{-moz-appearance:textfield;}
.form-row{display:grid;gap:8px;}
.thumb-wrap{width:100%;aspect-ratio:16/9;border-radius:7px;overflow:hidden;position:relative;cursor:pointer;border:1.5px dashed var(--bd2);transition:border-color .15s;background:var(--bg3);}
.thumb-wrap:hover{border-color:var(--gold);}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);}
.sep{border:none;border-top:1px solid var(--bd);margin:10px 0;}
.flex-btns{display:flex;gap:6px;}.flex-btns .close-btn{margin:0;}
.scale-ctrl{display:flex;align-items:center;gap:4px;}
.scale-btn{background:var(--bg3);border:1px solid var(--bd2);color:var(--text);width:22px;height:22px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
.scale-btn:hover{border-color:var(--gold);}
.scale-disp{font-size:10px;color:var(--muted);min-width:32px;text-align:center;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold);}

/* ============ スマホ縦表示対応 ============ */
/* body.mobile はJSが画面幅<=820pxのときに付与する（CSSの判定とJSの判定を一致させるため） */
body.mobile{display:block;align-items:stretch;justify-content:flex-start;-webkit-text-size-adjust:100%;}
html.mobile-root,body.mobile{overflow:auto;height:auto;}
body.mobile #scaleRoot{position:static!important;width:100%!important;height:auto!important;transform:none!important;left:0!important;top:0!important;}
body.mobile .app{height:auto;min-height:100vh;border-radius:0;border:none;}
/* モバイルのツールバーは固定列グリッドで配置を安定させつつ、
   4列(=ボタン2行)・余白圧縮で高さを抑えて画面占有率を下げる */
body.mobile .topbar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:5px 8px;align-items:stretch;}
body.mobile .topbar-sep{display:none;}            /* 区切り線はグリッドでは不要 */
body.mobile .app-title{font-size:12px;letter-spacing:1px;grid-column:1 / -1;align-self:center;margin:0;line-height:1.2;}
body.mobile .scale-ctrl{display:none;}
/* キャラ選択は1〜3列目に短縮し、空いた4列目に設定ボタンを置く（設定は折りたたみ対象外で常時表示）*/
body.mobile .char-select{grid-column:1 / 4;max-width:none!important;width:100%;font-size:13px;padding:5px 8px;}
body.mobile .topbar-settings-mobile{display:flex;align-items:center;justify-content:center;grid-column:4 / 5;color:#fff;border-color:var(--bd2);}
body.mobile .topbar-settings-pc{display:none!important;}   /* PC用の設定ボタンはモバイルでは重複するため隠す */
/* 各ボタンはセル全体に広げて行ごとに同じ位置へ固定。高さを抑えるため上下パディング・文字を圧縮。設定ボタンの inline margin-left:auto も打ち消す */
body.mobile .topbar .btn{width:100%;margin:0!important;padding:7px 3px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:center;}
body.mobile .topbar-menu-btn{display:flex;grid-column:1 / -1;border-color:var(--gold);color:var(--gold);}
body.mobile .topbar-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;grid-column:1 / -1;}
body.mobile .topbar.acts-collapsed .topbar-actions{display:none;}   /* 折りたたみ時は操作ボタン群を隠す */
body.mobile .main{flex-direction:column;}
body.mobile .left{width:100%;flex-shrink:1;border-right:none;border-bottom:2px solid var(--bd);max-height:42vh;}
body.mobile .move-list-wrap{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px;align-content:start;}
body.mobile .move-card{margin-bottom:0;min-width:0;}
body.mobile .move-card .m-row{min-width:0;}
body.mobile .m-name{font-size:12px;min-width:0;}
body.mobile .move-card-img,body.mobile .move-card-ph{width:100%;}
body.mobile .move-card-ph{overflow:hidden;}
body.mobile .right{flex:none;min-height:0;}
body.mobile .tabs{justify-content:center;}
body.mobile .tab{flex:1;text-align:center;padding:11px 8px;font-size:13px;}
body.mobile .move-list-title{font-size:13px;}
body.mobile .combo-scroll,body.mobile .tree-view-wrap{overflow:visible;}
/* STARTER TREE の凡例（分岐差分・ヒット状況）はモバイル幅では横はみ出しせず折り返す。
   各項目(.lg-dot)はアイコンとラベルが分かれないよう、まとまり単位で改行させる */
body.mobile .tree-diff-legend{flex-wrap:wrap;gap:5px 12px;line-height:1.5;}
body.mobile .tree-diff-legend .lg-dot{flex:0 0 auto;white-space:nowrap;}
body.mobile .tab-view{min-height:0;}
body.mobile #tab-memo>div{min-height:60vh;}
body.mobile #memoArea{min-height:300px;}
body.mobile .combo-name-inp{width:100%;}
body.mobile .drop-zone{min-height:54px;}
/* 「技を追加」中のヒント表示（一覧全体が金色に光らないよう控えめに） */
body.mobile.adding .move-card{border-color:rgba(244,123,32,.5);}
body.mobile.adding .move-card:active{background:var(--bg4);border-color:var(--gold);box-shadow:inset 0 0 0 1px rgba(244,123,32,.5);}
.combo-block.add-target{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
/* 編集ボタンで開閉する操作ボタン群（＋技を追加／分岐追加／削除を同サイズで表示）*/
.combo-actions{display:none;gap:6px;width:100%;margin-top:7px;margin-bottom:7px;}
.combo-block.editing .combo-actions{display:flex;}
/* ★ 編集中のコンボを強調表示：金色のリング＋グロー＋背景を一段明るく */
.combo-block.editing{
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(244,123,32,.6), 0 0 18px rgba(244,123,32,.28);
}
/* 編集中バッジ（ヘッダー左に表示） */
.editing-badge{
  font-size:9px;font-weight:700;letter-spacing:1px;color:#2e1c08;
  background:var(--gold);padding:2px 8px;border-radius:9px;flex-shrink:0;
  box-shadow:0 0 8px rgba(244,123,32,.55);white-space:nowrap;
  animation:editPulse 1.6s ease-in-out infinite;
}
@keyframes editPulse{0%,100%{box-shadow:0 0 6px rgba(244,123,32,.45);}50%{box-shadow:0 0 12px rgba(244,123,32,.85);}}
@media(prefers-reduced-motion:reduce){.editing-badge{animation:none;}}
.combo-act-btn{flex:1 1 0;min-width:0;font-size:12px;font-weight:600;padding:8px 6px;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;text-align:center;border:1px solid var(--bd2);background:var(--bg3);color:var(--text);transition:border-color .15s,background .15s;}
.combo-act-btn:hover{border-color:var(--gold);background:var(--bg4);}
.combo-act-btn.cab-add{border-color:var(--gold);color:var(--gold);background:#2e1c08;}
.combo-act-btn.cab-add:hover{background:#3a230a;}
.combo-act-btn.cab-del{border-color:#5a1a1a;color:#ff6666;flex:0 0 auto;margin-left:auto;padding-left:14px;padding-right:14px;}
.combo-act-btn.cab-del:hover{border-color:#ff4444;background:#2a1414;}
.combo-act-btn.cab-dup{border-color:#2a5566;color:#6fd0e6;}
.combo-act-btn.cab-dup:hover{border-color:#6fd0e6;background:#0f2a33;}
/* ★ 親付け替え用グリップ & ドロップ先ハイライト */
.combo-grip{cursor:grab;color:var(--dim);font-size:22px;line-height:1;padding:0 5px;user-select:none;flex-shrink:0;border-radius:4px;}
.combo-grip:hover{color:var(--gold);background:var(--bg3);}
.combo-grip:active{cursor:grabbing;}
body.mobile .combo-grip{display:none;}
.combo-block.cdrag{opacity:.45;}
.combo-block.cdrop-target{outline:2px dashed var(--gold);outline-offset:2px;}
/* ★ コンボ間（隙間）へのドロップで並び替え：挿入位置を金色のラインで表示 */
.combo-block.cdrop-before::after,
.combo-block.cdrop-after::after{
  content:"";position:absolute;left:0;right:0;height:0;
  border-top:3px solid var(--gold);border-radius:2px;
  box-shadow:0 0 8px rgba(244,123,32,.75);pointer-events:none;z-index:6;
}
.combo-block.cdrop-before::after{top:-5px;}
.combo-block.cdrop-after::after{bottom:-5px;}
#comboArea.cdrop-root{outline:2px dashed var(--bd2);outline-offset:-5px;border-radius:10px;}
/* ＋技を追加 はタッチ用。PC幅ではドラッグ&ドロップを使うため非表示 */
.combo-act-btn.cab-add{display:none;}
body.mobile .combo-act-btn.cab-add{display:block;}
/* 非編集時：入力欄は読み取り専用ラベルのように表示 */
.combo-block:not(.editing) .combo-name-inp,
.combo-block:not(.editing) .combo-dmg-inp,
.combo-block:not(.editing) .combo-frame-inp,
.combo-block:not(.editing) input[data-note]{
  opacity:1!important;-webkit-text-fill-color:var(--text);color:var(--text);
  background:transparent;border-color:transparent;cursor:default;
}
.combo-block:not(.editing) .ctag{cursor:default;}
/* 改善1: 非編集時の DG 表示は枠・背景を消してラベル化（DMG/FRAME と統一）。手動上書き時のみゴールド文字で示す */
.combo-block:not(.editing) .combo-dg-disp{background:transparent;border-color:transparent;color:#2ecc71;padding:2px 0;min-width:0;}
.combo-block:not(.editing) .combo-dg-disp.manual{color:var(--gold);}
/* コンボ表示順の並び替えボタン（編集中のみ表示）*/
.ord-btn{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;line-height:1;border:1px solid var(--bd2);background:var(--bg3);color:var(--text);border-radius:5px;cursor:pointer;font-family:inherit;padding:0;}
.ord-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.ord-btn:disabled{opacity:.25;cursor:default;}
body.mobile .ord-btn{width:32px;height:32px;font-size:12px;}
.mobile-add-btn{display:none;}
body.mobile .mobile-add-btn{display:inline-flex;align-items:center;gap:4px;background:#2e1c08;border:1px solid var(--gold);color:var(--gold);font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;}
/* 画面下部の「追加中」バナー */
#addBanner{position:fixed;left:0;right:0;bottom:0;z-index:900;background:var(--bg2);border-top:2px solid var(--gold);padding:10px 14px;display:none;align-items:center;gap:10px;font-size:13px;color:var(--text);box-shadow:0 -4px 16px rgba(0,0,0,.5);}
#addBanner.show{display:flex;}
#addBanner .ab-name{color:var(--gold);font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#addBanner .ab-done{background:var(--gold);color:#2e1c08;border:none;font-weight:700;font-size:13px;padding:8px 16px;border-radius:7px;cursor:pointer;font-family:inherit;}
body.mobile.adding{padding-bottom:60px;}
/* ★ モバイル: MOVE LISTの折り畳み（画面を広く使う） */
.ml-toggle{display:none;}
body.mobile .panel-hdr{cursor:pointer;user-select:none;}
body.mobile .ml-toggle{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:1px solid var(--bd2);background:var(--bg3);color:var(--gold);border-radius:6px;font-size:15px;line-height:1;}
body.mobile .left.collapsed{max-height:none;}
body.mobile .left.collapsed .sort-bar,
body.mobile .left.collapsed .move-list-wrap{display:none;}
</style>
</head>
<body>
<div id="scaleRoot">
<div class="app">
  <div class="topbar acts-collapsed" id="topbar">
    <div class="app-title">SF6 COMBO MEMO</div>
    <div class="topbar-sep"></div>
    <select class="char-select" id="charSelect" onchange="switchChar(this.value)" style="max-width:130px;"></select>
    <button class="btn topbar-settings-mobile" onclick="openSettingsModal()" data-i18n="btnSettings">⚙ 設定</button>
    <button class="btn topbar-menu-btn" id="topbarMenuBtn" onclick="toggleTopbarMenu()"><span data-i18n="btnMenu">≡ メニュー</span><span id="menuArrow" style="margin-left:5px;">▾</span></button>
    <div class="topbar-actions" id="topbarActions">
    <div class="tb-group">
    <button class="btn" onclick="openRenameCharModal()" data-i18n="btnRenameChar">✎ キャラ名</button>
    <button class="btn gold" onclick="openAddCharModal()" data-i18n="btnAddChar">＋ キャラ</button>
    <button class="btn gold" onclick="openAddMoveModal()" data-i18n="btnAddMove">＋ 技追加</button>
    <button class="btn special" onclick="deleteCurrentChar()" data-i18n="btnDelChar">キャラ削除</button>
    </div>
    <div class="tb-group">
    <span class="unsaved-dot" id="unsavedDot" title="未保存の変更があります"></span>
    <button class="btn green" onclick="saveToStorage()" data-i18n="btnSave">💾 保存</button>
    <button class="btn" onclick="exportJSON()" data-i18n="btnExport">📤 書き出し</button>
    <button class="btn" onclick="triggerImport()" data-i18n="btnImport">📥 読み込み</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    </div>
    <button class="btn" onclick="openTutorial()" style="font-size:11px;border-color:#9b59b6;color:#9b59b6;" data-i18n="btnHelp">？ 使い方</button>
    <div class="topbar-sep"></div>
    <div class="tb-group tb-right">
    <div class="scale-ctrl">
      <button class="scale-btn" onclick="changeScale(-0.1)">－</button>
      <span class="scale-disp" id="scaleDisp">100%</span>
      <button class="scale-btn" onclick="changeScale(0.1)">＋</button>
      <button class="btn" onclick="autoScale()" style="font-size:10px;padding:3px 6px;">Auto</button>
    </div>
    <button class="btn topbar-settings-pc" onclick="openSettingsModal()" data-i18n="btnSettings">⚙ 設定</button>
    </div>
    </div>
  </div>
  <div class="main">
    <div class="left">
      <div class="panel-hdr" onclick="toggleMoveList()"><span style="display:flex;align-items:center;gap:8px;"><span class="move-list-title">MOVE LIST</span><span id="moveCount" style="color:#8e8e9c;font-size:9px;"></span></span><span class="ml-toggle" id="mlToggle">▾</span></div>
      <div class="sort-bar" id="sortBar"></div>
      <div class="move-list-wrap" id="moveList"></div>
    </div>
    <div class="right">
      <div class="tabs">
        <div class="tab active" data-tab="combo" onclick="switchTab('combo')">COMBO LIST</div>
        <div class="tab" data-tab="tree" onclick="switchTab('tree')">STARTER TREE</div>
        <div class="tab" data-tab="memo" onclick="switchTab('memo')"> MEMO</div>
      </div>
      <div class="tab-view active" id="tab-combo">
        <div class="filter-bar" id="filterBar"></div>
        <div class="combo-scroll"><div class="combo-area" id="comboArea"></div></div>
        <div class="bottom-bar"><button class="add-combo-btn" onclick="addCombo()">＋ NEW COMBO</button></div>
      </div>
      <div class="tab-view" id="tab-tree">
        <div class="tree-view-wrap" id="treeViewWrap"></div>
      </div>
      <div class="tab-view" id="tab-memo">
        <div style="display:flex;flex-direction:column;flex:1;min-height:0;padding:12px;gap:8px;">
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
            <span style="font-size:9px;letter-spacing:2px;color:var(--gold);">FREE MEMO</span>
            <span style="font-size:10px;color:var(--muted);" data-i18n="memoDesc">— キャラごとに自由に書き込めるメモ欄です</span>
            <button class="btn green" onclick="saveMemo()" style="margin-left:auto;font-size:10px;padding:3px 8px;" data-i18n="btnSaveMemo">💾 メモ保存</button>
          </div>
          <textarea id="memoArea" spellcheck="false" data-i18n-ph="memoPlaceholder" placeholder="ここに自由にメモを記入できます&#10;&#10;例:&#10;・コンボのコツや注意点&#10;・対策メモ&#10;・起き攻めパターン&#10;・キャラ対策など" style="flex:1;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:14px 16px;outline:none;resize:none;line-height:1.7;transition:border-color .15s;"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<div id="modalRoot"></div>
<div id="addBanner">
  <span class="ab-name" id="addBannerName"></span>
  <span style="color:var(--muted);font-size:11px;white-space:nowrap;" data-i18n="addBannerHint">技をタップで追加</span>
  <button class="ab-done" onclick="endAddMode()" data-i18n="addBannerDone">完了</button>
</div>
<script>

const CAT={
  Normal:{fg:'#3498db',bg:'#15334a',label:'通常技'},
  jump:{fg:'#9b59b6',bg:'#281640',label:'空中技'},
  special_tech:{fg:'#1abc9c',bg:'#0d342f',label:'特殊技'},
  special:{fg:'#e74c3c',bg:'#3a1513',label:'必殺技'},
  od:{fg:'#f1c40f',bg:'#322a06',label:'OD必殺'},
  super:{fg:'#7d5fff',bg:'#1e1a3a',label:'SA'},
  drive:{fg:'#2ecc71',bg:'#0f3424',label:'DR技'},
  throw:{fg:'#e84393',bg:'#3a1526',label:'投げ'},
  other:{fg:'#aab3bd',bg:'#2a3540',label:'その他'},
};
const CAT_ORDER=['Normal','jump','special_tech','special','od','super','drive','throw','other'];
// COMBO LISTのタグ色は MOVE LIST の技カテゴリ8色（通常技〜投げ）と統一し、9個目以降は循環させる。
// active時の色(abg/afg)は各カテゴリ色から自動生成する。
const _h2r=h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
const _r2h=a=>'#'+a.map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
const _mixc=(a,b,t)=>{const A=_h2r(a),B=_h2r(b);return _r2h([0,1,2].map(i=>A[i]+(B[i]-A[i])*t));};
const TC=CAT_ORDER.filter(k=>k!=='other').map(k=>{const c=CAT[k];return{bg:c.bg,fg:c.fg,abg:_mixc(c.bg,c.fg,0.5),afg:_mixc(c.fg,'#ffffff',0.45)};});
// タグの色は「キャラのタグ全体リストでの位置」で一意に決める（どこでも同じ色になる）
function tagColor(tag){const idx=(cur().tags||[]).indexOf(tag);return TC[(idx<0?0:idx)%TC.length];}

// ── 言語設定 (i18n) ──
// UIのみを日本語/英語で切替える。キャラクター名・技名・コマンド・備考・タグはデータなので翻訳しない。
let LANG=(()=>{try{return localStorage.getItem('sf6_lang')||'ja';}catch(e){return'ja';}})();
function t(key){const o=I18N[key];if(!o)return key;const v=o[LANG];return v!=null?v:(o.ja!=null?o.ja:key);}
function setLang(l){
  if(l!=='ja'&&l!=='en')l='ja';
  LANG=l;try{localStorage.setItem('sf6_lang',l);}catch(e){}
  document.documentElement.lang=l;
  applyStaticI18n();autoScale();render();openSettingsModal();
}
// data-i18n / data-i18n-ph を持つ静的要素のテキスト・プレースホルダを現在の言語で更新する
function applyStaticI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.setAttribute('placeholder',t(el.getAttribute('data-i18n-ph')));});
  const tt=document.querySelector('title');if(tt)tt.textContent='SF6 COMBO MEMO';
}
// 技カテゴリのラベル（UI表示用。技名そのものではないので翻訳する）
const CAT_LABELS={
  Normal:{ja:'通常技',en:'Normals'},
  jump:{ja:'空中技',en:'Air'},
  special_tech:{ja:'特殊技',en:'Unique'},
  special:{ja:'必殺技',en:'Specials'},
  od:{ja:'OD必殺',en:'OD'},
  super:{ja:'SA',en:'SA'},
  drive:{ja:'DR技',en:'Drive'},
  throw:{ja:'投げ',en:'Throws'},
  other:{ja:'その他',en:'Other'},
};
function catLabel(k){const o=CAT_LABELS[k];return o?(o[LANG]||o.ja):(CAT[k]?CAT[k].label:k);}
// ドライブゲージ本数の表記（日本語は「N本」、英語は数字のみ）
function barsTxt(n){return LANG==='ja'?(n+'本'):(''+n);}
// コンボ終了時フレームの表示整形。正の値には必ず「＋」を付ける（負は「-」、0は符号なし）。
// 数値でない値（万一の手入力）はそのまま返す。
function fmtFrame(v){
  if(v===''||v==null)return '';
  const n=parseFloat(v);
  if(isNaN(n))return String(v);
  return (n>0?'+':'')+n+'F';
}
function movesUnit(n){return LANG==='ja'?(n+'技'):(n+(n===1?' move':' moves'));}
function combosUnit(n){return LANG==='ja'?(n+'コンボ'):(n+(n===1?' combo':' combos'));}

const I18N={
  // topbar
  btnAddChar:{ja:'＋ キャラ',en:'＋ Character'},
  btnAddMove:{ja:'＋ 技追加',en:'＋ Move'},
  btnDelChar:{ja:'キャラ削除',en:'Delete char'},
  btnSave:{ja:'💾 保存',en:'💾 Save'},
  btnExport:{ja:'📤 書き出し',en:'📤 Export'},
  btnImport:{ja:'📥 読み込み',en:'📥 Import'},
  btnHelp:{ja:'？ 使い方',en:'？ Guide'},
  btnSettings:{ja:'⚙ 設定',en:'⚙ Settings'},
  // memo tab
  memoDesc:{ja:'— キャラごとに自由に書き込めるメモ欄です',en:'— A free notes field for each character'},
  btnSaveMemo:{ja:'💾 メモ保存',en:'💾 Save memo'},
  memoPlaceholder:{
    ja:'ここに自由にメモを記入できます\n\n例:\n・コンボのコツや注意点\n・対策メモ\n・起き攻めパターン\n・キャラ対策など',
    en:'Write any notes here\n\nExamples:\n- Combo tips and reminders\n- Counter-strategy notes\n- Okizeme / wake-up patterns\n- Matchup notes, etc.'
  },
  // add banner (mobile)
  addBannerHint:{ja:'技をタップで追加',en:'Tap a move to add'},

function buildSeedChar(cfg){
  return {name:cfg.name,moves:cfg.build(),combos:[],tags:[...DEFAULT_TAGS],seedVersion:SEED_VERSION};
}

// 保存済みデータに最新シードを反映する。
// コンボ・メモ・タグ・ユーザー追加技・登録済みサムネ画像は保持したまま、内蔵技のフレームデータだけを更新する。
function migrateSeed(db){
  let changed=false;
  Object.entries(CHARS).forEach(([id,cfg])=>{
    const saved=db.chars[id];
    if(!saved){db.chars[id]=buildSeedChar(cfg);changed=true;return;} // 新規キャラを追加
    if((saved.seedVersion||0)>=SEED_VERSION)return; // 既に最新
    const seed=cfg.build();
    const seedIds=new Set(seed.map(m=>m.id));
    const seedByName={};seed.forEach(m=>{if(!(m.name in seedByName))seedByName[m.name]=m.id;});
    const oldById={};const oldByName={};
    (saved.moves||[]).forEach(m=>{oldById[m.id]=m;if(!(m.name in oldByName))oldByName[m.name]=m;});
    // 旧ID→新IDのリマップ：IDが健在ならそのまま、無ければ技名で対応付け（旧スキーム救済）
    const remap={};
    (saved.moves||[]).forEach(m=>{if(seedIds.has(m.id))return;const nid=seedByName[m.name];if(nid)remap[m.id]=nid;});
    if(Object.keys(remap).length)(saved.combos||[]).forEach(c=>{c.moves=(c.moves||[]).map(x=>remap[x]||x);});
    // シード技を最新化しつつ、登録済みサムネはID一致優先・無ければ技名一致で引き継ぐ
    const merged=seed.map(sm=>{const o=oldById[sm.id]||oldByName[sm.name];return (o&&o.thumb)?{...sm,thumb:o.thumb}:sm;});
    // ユーザー独自追加技（シードにID・技名どちらも無い）は維持
    (saved.moves||[]).forEach(m=>{if(!seedIds.has(m.id)&&!seedByName[m.name])merged.push(m);});
    saved.moves=merged;saved.seedVersion=SEED_VERSION;changed=true;
  });
  return changed;
}

function initDB(){

  if(saved){
    if(!saved.currentChar||!saved.chars[saved.currentChar])saved.currentChar=Object.keys(saved.chars)[0]||'リュウ';
    if(migrateSeed(saved)){try{localStorage.setItem('sf6_v5',JSON.stringify(saved));}catch(e){}}
    return saved;
  }
  const chars={};
  Object.entries(CHARS).forEach(([id,cfg])=>{chars[id]=buildSeedChar(cfg);});
  return {currentChar:'リュウ',chars};
}

}

// 技ID→技オブジェクトのMap参照（描画ループ内の線形探索 moves.find を O(1) 化）。
// 技データが変わるのは render() を伴う操作のみなので、render() 先頭で作り直し、
// キャラ切替時も自動で作り直す（_mvMapChar で判定）。
let _mvMap=null,_mvMapChar=null;
function rebuildMoveMap(){const mm=new Map();const c=cur();((c&&c.moves)||[]).forEach(m=>mm.set(m.id,m));_mvMap=mm;_mvMapChar=db.currentChar;return mm;}
function mv(id){if(!_mvMap||_mvMapChar!==db.currentChar)rebuildMoveMap();return _mvMap.get(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function calcDG(combo){let t=0;(combo.moves||[]).forEach(mid=>{const m=mv(mid);if(m)t+=m.dgCost||0;});return t;}
// 手動上書き判定と有効DG（空欄/未設定なら自動計算、数値なら手動値）
function comboDGManual(combo){const o=combo&&combo.dgOverride;return o!=null&&o!==''&&!isNaN(parseFloat(o));}
function comboDG(combo){return comboDGManual(combo)?parseFloat(combo.dgOverride):calcDG(combo);}
// 各技のヒット状況（''=通常 / 'C'=カウンター / 'PC'=パニッシュカウンター）を保持する
// 並行配列 combo.counters を combo.moves と同じ長さに揃える。古いデータ・不整合を補正。
function ensureCounters(combo){
  if(!combo)return;
  if(!Array.isArray(combo.counters))combo.counters=[];
  const n=(combo.moves||[]).length;
  while(combo.counters.length<n)combo.counters.push('');
  if(combo.counters.length>n)combo.counters.length=n;
}
// ヒット状況の表示メタ（CSSクラス・ラベル・説明）と切替順（通常→C→PC→D→通常）

  if(v==='C')return{cls:'ctr-c',label:'C',title:t('ctrCounter')};
  if(v==='PC')return{cls:'ctr-pc',label:'PC',title:t('ctrPunish')};
  if(v==='D')return{cls:'ctr-d',label:'D',title:t('ctrDelay')};
  if(v==='G')return{cls:'ctr-g',label:'G',title:t('ctrGuard')};
  return{cls:'ctr-none',label:'—',title:t('ctrNormal')};
}
function nextCtr(v){return v===''?'C':v==='C'?'PC':v==='PC'?'D':v==='D'?'G':'';}

// ── IMAGE STORE (IndexedDB) ──
// 画像はlocalStorageではなくIndexedDBにBlobのまま保存する（容量・base64膨張の回避）。
// db側の move.thumb には「画像キー文字列」だけを持たせ、本体はIDBに分離する。
// 旧形式（data:URLが直接入っている）も thumbSrc() でそのまま表示できる（後方互換）。
const IDB_NAME='sf6img', IDB_STORE='images';
let _idbP=null;
function idb(){
  if(_idbP)return _idbP;
  _idbP=new Promise((res,rej)=>{
    const rq=indexedDB.open(IDB_NAME,1);
    rq.onupgradeneeded=()=>{const d=rq.result;if(!d.objectStoreNames.contains(IDB_STORE))d.createObjectStore(IDB_STORE);};
    rq.onsuccess=()=>res(rq.result);
    rq.onerror=()=>rej(rq.error);
  });
  return _idbP;
}
function idbPutImage(key,blob){return idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(blob,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
function idbGetImage(key){return idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readonly');const r=tx.objectStore(IDB_STORE).get(key);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);}));}
function idbDeleteImage(key){return idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
function idbClearImages(){return idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).clear();tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}

// 画像キー → ObjectURL のメモリキャッシュ。描画は同期のままで、URLが未取得なら
// 一旦プレースホルダを表示し、loadThumbsForCurrentChar() が取得後に再描画する。
const thumbURLs=new Map();
let _thumbLoading=false;
function isImgKey(v){return typeof v==='string'&&v&&!v.startsWith('data:');}
function thumbSrc(m){
  if(!m||!m.thumb)return '';
  if(typeof m.thumb==='string'&&m.thumb.startsWith('data:'))return m.thumb; // 旧形式（インラインbase64）
  return thumbURLs.get(m.thumb)||''; // IDBキー → ObjectURL（未ロード時は空）
}
function loadThumbsForCurrentChar(){
  if(_thumbLoading)return;
  const startChar=db.currentChar; // 読み込み開始時のキャラを記録
  const c=cur();if(!c)return;
  const need=[];
  (c.moves||[]).forEach(m=>{if(isImgKey(m.thumb)&&!thumbURLs.has(m.thumb))need.push(m.thumb);});
  if(!need.length)return;
  _thumbLoading=true;
  (async()=>{
    let added=false;
    for(const k of need){
      try{const blob=await idbGetImage(k);if(blob){thumbURLs.set(k,URL.createObjectURL(blob));added=true;}}catch(e){}
    }
    _thumbLoading=false;
    // サムネが出るのは技リスト（と編集モーダル）のみ。全体render()ではなく技リストだけ更新して軽量化
    if(added)renderMoveList();
    // 読み込み中にキャラが切り替わっていたら、新キャラ分を続けて読み込む（同一キャラでは再走査しないので無限ループにならない）
    if(db.currentChar!==startChar)loadThumbsForCurrentChar();
  })();
}
function blobToDataURL(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob);});}
function dataURLToBlob(dataURL){const parts=dataURL.split(',');const mime=(parts[0].match(/:(.*?);/)||[])[1]||'image/png';const bin=atob(parts[1]);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime});}

// ── STORAGE / IO ──
function saveToStorage(){try{localStorage.setItem('sf6_v5',JSON.stringify(db));savedSnapshot=JSON.stringify(db);updateSavedIndicator();showToast(t('savedToast'));}catch(e){showToast(t('saveFail')+e.message,'err');}}
async function exportJSON(){
  try{
    // db本体（thumbは画像キー）を複製し、参照されている画像をIDBから集めて
    // base64で _images に同梱する。これにより1ファイルで完結し、別環境でも復元できる。
    const data=JSON.parse(JSON.stringify(db));
    const keys=new Set();
    Object.values(data.chars||{}).forEach(c=>(c.moves||[]).forEach(m=>{if(isImgKey(m.thumb))keys.add(m.thumb);}));
    const images={};
    for(const k of keys){try{const blob=await idbGetImage(k);if(blob)images[k]=await blobToDataURL(blob);}catch(e){}}
    const out=Object.assign({},data,{_images:images,_imgFormat:'idb-v1'});
    const b=new Blob([JSON.stringify(out)],{type:'application/json'});
    const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='sf6_combo.json';a.click();URL.revokeObjectURL(u);
    showToast(t('exportDone'));
  }catch(e){showToast(t('exportFail')+e.message,'err');}
}
function triggerImport(){document.getElementById('importFile').click();}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=async e=>{
    try{const d=JSON.parse(e.target.result);if(!d.chars)throw new Error(t('invalidFormat'));
      // 同梱画像（_images: {キー: dataURL}）があればIDBへ書き戻す。
      const images=d._images||null;delete d._images;delete d._imgFormat;
      if(images){for(const k of Object.keys(images)){try{await idbPutImage(k,dataURLToBlob(images[k]));}catch(err){}}}
      db=d;if(!db.currentChar||!db.chars[db.currentChar])db.currentChar=Object.keys(db.chars)[0];
      migrateSeed(db);
      // 既存のObjectURLキャッシュを破棄して、新データの画像を取り直す。
      thumbURLs.forEach(u=>URL.revokeObjectURL(u));thumbURLs.clear();
      activeTag='ALL';activeSort='ALL';render();showToast(t('importDone'));
    }catch(err){showToast(t('importFail')+err.message,'err');}
  };r.readAsText(f);input.value='';
}
function showToast(msg,type){
  const t=document.createElement('div');const ok=type!=='err';
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:${ok?'#1a3a1a':'#3a1a1a'};border:1px solid ${ok?'#4caf50':'#ff6666'};color:${ok?'#a0e0a0':'#ff9999'};padding:8px 16px;border-radius:8px;font-size:12px;z-index:9999;font-family:inherit;`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

    D(`• ${b('＋ NEW COMBO')} — Add a new combo<br>• ${b('DMG / DG fields')} — Enter damage manually; Drive Gauge cost is auto-calculated, and ${b('you can override it by typing a number in the DG field while editing')} (leave blank to revert to auto — useful when auto-calc is off, e.g. OD→OD derivations)<br>• ${b('FRAME field')} — Manually enter the frame advantage/disadvantage at combo end<br>• ${b('▲▼ Reorder')} — Change the display order while editing (parent/child combos move together)<br>• ${b('Duplicate a move (⧉)')} — While editing, the ⧉ button on each move in a combo inserts another copy of that move right after it (e.g. LP → LP LP)<br>• ${b('Duplicate a combo')} — Copy the combo being edited in full (${b('including its branch tree')}), inserted just below at the same level. Handy for mass-producing similar variants<br>• ${b('📋 Copy notation')} — Copy the combo notation to the clipboard (paste it anywhere)<br>• ${b('Repeated move display')} — In COMBO LIST / STARTER TREE, consecutive identical moves are shown grouped like "LP×3" (toggle ON/OFF in ${b('⚙ Settings')}; ${b('📋 Copy notation')} is copied with "×3" too). ${b('While editing a combo')}, they revert to one-by-one display for finer reordering<br>• ${b('Tags')} — Tag combos and filter by them`)+

// ── RENDER ──
function render(){rebuildMoveMap();renderCharSelect();renderSortBar();renderMoveList();renderFilterBar();renderCombos();if(activeTab==='tree')renderTree();loadThumbsForCurrentChar();updateSavedIndicator();}

function renderCharSelect(){
  const sel=document.getElementById('charSelect');sel.innerHTML='';
  Object.keys(db.chars).forEach(id=>{
    const o=document.createElement('option');o.value=id;o.textContent=db.chars[id].name;
    if(id===db.currentChar)o.selected=true;sel.appendChild(o);
  });
}
function renderSortBar(){
  const bar=document.getElementById('sortBar');bar.innerHTML='';
  ['ALL',...CAT_ORDER].forEach(c=>{
    if(c!=='ALL'&&!cur().moves.some(m=>m.type===c))return;
    const label=c==='ALL'?'ALL':catLabel(c);
    const p=document.createElement('div');p.className='sort-pill'+(activeSort===c?' active':'');p.textContent=label;
    if(c!=='ALL'){p.style.color=cs(c).fg;if(activeSort===c)p.style.borderColor=cs(c).fg;}
    else if(activeSort===c){p.style.background='#3a3a4a';p.style.borderColor='#ffffff';p.style.color='#ffffff';}
    p.onclick=()=>{activeSort=c;renderSortBar();renderMoveList();};
    bar.appendChild(p);
  });
}
function renderMoveList(){
  const el=document.getElementById('moveList');
  let moves=cur().moves;
  if(activeSort!=='ALL')moves=moves.filter(m=>m.type===activeSort);
  document.getElementById('moveCount').textContent=movesUnit(moves.length);
  if(!moves.length){el.innerHTML='<div style="color:#7a7a8a;font-size:11px;padding:10px;text-align:center;">'+esc(t('noMoves'))+'</div>';}
  else{
    // カードごとに createElement/appendChild するより、1回の innerHTML 代入でまとめて構築する方が軽い
    el.innerHTML=moves.map(m=>{
      const s=cs(m.type);const dgc=m.dgCost||0;const ts=thumbSrc(m);
      const imgHtml=ts
        ?`<img src="${esc(ts)}" class="move-card-img">`
        :`<div class="move-card-ph" style="background:${s.bg};color:${s.fg};font-size:10px;padding:4px;">${esc(m.inputStr)}</div>`;
      return `<div class="move-card" draggable="true" data-mid="${esc(m.id)}"><span class="move-card-grip" title="${esc(t('gripMoveTitle'))}">⠿</span>${imgHtml}<div class="m-row"><div class="m-name">${esc(m.name)}</div>${condMark(m)}<button class="m-edit-btn">✎</button></div><div class="m-row" style="margin-top:1px;"><span class="m-type-lbl" style="color:${s.fg}">${esc(m.inputStr)}</span>${dgc>0?`<span class="m-dg">DG:${dgc}</span>`:''}</div></div>`;
    }).join('');
  }
  // イベントはカードごとに付けず、コンテナへ一度だけ委譲登録する（描画のたびのリスナー再生成を回避）
  if(!el._mlBound){
    el._mlBound=true;
    el.addEventListener('click',e=>{
      const card=e.target.closest('.move-card');if(!card)return;const id=card.dataset.mid;
      if(e.target.closest('.m-edit-btn')){e.stopPropagation();openAddMoveModal(id);return;}
      if(isMobile()&&activeAddCombo!=null){addMoveToActiveCombo(id);return;}
      showMoveModal(id);
    });
    el.addEventListener('dragstart',e=>{
      const card=e.target.closest('.move-card');if(!card)return;
      dragSrc={type:'new',moveId:card.dataset.mid};card.classList.add('dragging');
      if(e.dataTransfer)e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend',e=>{const card=e.target.closest('.move-card');if(card)card.classList.remove('dragging');});
  }
}
function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML='<span style="font-size:10px;color:#8e8e9c;letter-spacing:1px;white-space:nowrap;">'+esc(t('filterLabel'))+'</span>';
  const ALLC={bg:'#23232e',fg:'#cfcfe0',abg:'#3a3a4a',afg:'#ffffff'};

// コンボの「親子関係・深さ」を描画前に一度だけ索引化する。
// これにより各ブロック描画時の char.combos.find / filter（コンボ数の2乗オーダー）を
// Map参照（定数オーダー）に置き換え、コンボが増えても描画が重くならないようにする。
let _comboById=new Map(),_childrenByParent=new Map(),_depthById=new Map();
function _buildComboIndex(combos){
  _comboById=new Map();_childrenByParent=new Map();_depthById=new Map();
  combos.forEach(c=>{
    _comboById.set(c.id,c);
    const pid=c.parentId||null;
    let arr=_childrenByParent.get(pid);if(!arr){arr=[];_childrenByParent.set(pid,arr);}arr.push(c);
  });
  combos.forEach(c=>{
    let d=0,p=c.parentId;const seen=new Set();
    while(p!=null&&!seen.has(p)){seen.add(p);const par=_comboById.get(p);if(!par)break;d++;p=par.parentId;}
    _depthById.set(c.id,d);
  });
}
function renderCombos(){
  const area=document.getElementById('comboArea');area.innerHTML='';
  // 付け替え用：背景（コンボの無い余白）へのドロップでルート化。要素は使い回されるので一度だけ登録。
  if(area&&!area._cdropBound){
    area._cdropBound=true;
    area.addEventListener('dragover',e=>{if(comboDragId==null||e.target!==area)return;e.preventDefault();area.classList.add('cdrop-root');});
    area.addEventListener('dragleave',e=>{if(comboDragId!=null&&e.target===area)area.classList.remove('cdrop-root');});
    area.addEventListener('drop',e=>{if(comboDragId==null||e.target!==area)return;e.preventDefault();area.classList.remove('cdrop-root');const src=comboDragId;comboDragId=null;reparentCombo(src,null);});
  }
  const char=cur();
  if(char&&Array.isArray(char.combos))char.combos=NormalizeComboOrder(char.combos); // 親子を必ず隣接させる
  _buildComboIndex(char.combos||[]); // ★ 親子・深さを一度だけ索引化（以降の描画はMap参照で軽量）
  const combos=(char.combos||[]).filter(c=>activeTag==='ALL'||c.tags.includes(activeTag));
  if(!combos.length){area.innerHTML='<div class="no-combos">'+esc(t('noCombos'))+'<br><span style="font-size:11px;color:#6f6f82;">'+esc(t('noCombosHint'))+'</span></div>';updateSavedIndicator();return;}
  combos.forEach(c=>renderComboBlock(area,c));
  updateSavedIndicator();
}
function renderComboBlock(area,combo){
  const char=cur();const dgAuto=calcDG(combo);const dgManual=comboDGManual(combo);const dg=dgManual?parseFloat(combo.dgOverride):dgAuto;
  ensureCounters(combo); // ★ ヒット状況の並行配列を moves と同じ長さに揃える
  const editing=editingCombos.has(combo.id);
  // 並び替えは「同じ親を持つ兄弟」の中でのみ行う（親と子のまとまりを保つ）
  const _sibs=_childrenByParent.get(combo.parentId||null)||[];
  const _si=_sibs.findIndex(c=>c.id===combo.id);
  const _multi=_sibs.length>1,_isFirst=_si<=0,_isLast=_si>=_sibs.length-1;
  const block=document.createElement('div');block.className='combo-block'+(combo.id===activeAddCombo?' add-target':'')+(editing?' editing':'')+(combo.parentId?' is-branch':'');
  const _depth=comboDepth(combo);
  if(_depth>0)block.style.marginLeft=(Math.min(_depth,6)*18)+'px';
  // ★ 差分: 親と共通する技の数（先頭から一致する数）= 分岐後の開始位置
  const _parent=combo.parentId?_comboById.get(combo.parentId):null;
  let _divergeIdx=-1;
  if(_parent){
    _divergeIdx=combo.moves.length;
    for(let i=0;i<combo.moves.length;i++){if(i>=_parent.moves.length||combo.moves[i]!==_parent.moves[i]){_divergeIdx=i;break;}}
  }
  // ★ 実際に分岐後の固有技があるか。無い（親と同一/親の先頭部分のみ）ときは差分色分けせず通常表示にする。
  const _hasDiverged=!!_parent&&_divergeIdx<combo.moves.length;
  const tagsHtml=(combo.tags||[]).map((t)=>{const tc=tagColor(t);return`<span class="ctag" style="background:${tc.bg};color:${tc.fg};" data-tag="${esc(t)}">${esc(t)}${editing?' <span style="opacity:.5;font-size:9px;">✕</span>':''}</span>`;}).join('');
  const avail=(char.tags||[]).filter(t=>!(combo.tags||[]).includes(t));
  const parentName=_parent?(_parent.name||''):'';
  block.innerHTML=`
    <div class="combo-hdr">
      <span class="combo-grip" draggable="true" data-grip="${combo.id}" title="${esc(t('gripTitle'))}">⠿</span>
      ${editing?`<span class="editing-badge">${esc(t('editingBadge'))}</span>`:''}
      <input class="combo-name-inp" value="${esc(combo.name)}" placeholder="${esc(t('comboNamePh'))}" data-cid="${combo.id}" ${editing?'':'disabled'}>
      <span class="lbl-sm">DMG</span>
      <input class="combo-dmg-inp" type="number" value="${combo.damage||''}" placeholder="----" data-did="${combo.id}" ${editing?'':'disabled'}>
      <span class="lbl-sm" title="${esc(t('frameTitle'))}">${esc(t('frameLabel'))}</span>
      ${editing
        ? `<input class="combo-frame-inp" type="number" value="${combo.frame||''}" placeholder="----" title="${esc(t('frameTitle'))}" data-fid="${combo.id}">`
        : `<input class="combo-frame-inp" type="text" value="${(combo.frame!==''&&combo.frame!=null)?esc(fmtFrame(combo.frame)):''}" placeholder="----" title="${esc(t('frameTitle'))}" disabled>`}
      <span class="lbl-sm">DG</span>${editing
        ? `<input class="combo-dg-inp" type="number" min="0" step="0.5" value="${dgManual?esc(String(combo.dgOverride)):''}" placeholder="${dgAuto}" title="${esc(t('dgTitle'))}" data-dgid="${combo.id}">`
        : `<div class="combo-dg-disp${dgManual?' manual':''}"${dgManual?` title="${esc(t('dgManualTitle'))}（${esc(t('dgAutoLabel'))}: ${barsTxt(dgAuto)}）"`:''}>${barsTxt(dg)}</div>`}
      ${combo.parentId?`<div style="font-size:10px;color:#8e8e9c;border-left:1px solid #2a2a3a;padding-left:8px;">↳ ${esc(parentName)}</div>`:''}
      <div style="margin-left:auto;display:flex;gap:4px;align-items:center;">
        ${editing&&_multi?`<button class="ord-btn" data-up="${combo.id}" title="${esc(t('ordUp'))}" ${_isFirst?'disabled':''}>▲</button><button class="ord-btn" data-down="${combo.id}" title="${esc(t('ordDown'))}" ${_isLast?'disabled':''}>▼</button>`:''}
        <button class="btn" style="font-size:10px;padding:3px 8px;" data-copy="${combo.id}" title="${esc(t('cmdOutTitle'))}">${t('cmdOut')}</button>
        <button class="btn ${editing?'gold':''}" style="font-size:10px;padding:3px 10px;" data-editbtn="${combo.id}">${editing?t('editDone'):t('edit')}</button>
      </div>
    </div>
    <div class="combo-actions">
      <button class="combo-act-btn cab-add" data-addmode="${combo.id}">${combo.id===activeAddCombo?t('endAddBtn'):t('addMoveBtn')}</button>
      <button class="combo-act-btn cab-branch" data-branch="${combo.id}">${t('branchAdd')}</button>
      <button class="combo-act-btn cab-dup" data-dup="${combo.id}">${t('duplicate')}</button>
      <button class="combo-act-btn cab-del" data-del="${combo.id}">${t('del')}</button>
    </div>

function getDesc(id){const char=cur();let r=[];function c(p){char.combos.filter(x=>x.parentId===p).forEach(x=>{r.push(x.id);c(x.id);});}c(id);return r;}
// コンボの分岐の深さ（トップレベル=0, 子=1, 孫=2 ...）を返す
function comboDepth(combo){
  if(_depthById&&_depthById.has(combo.id))return _depthById.get(combo.id); // 索引済みなら定数時間
  const char=cur();let d=0,p=combo.parentId;const seen=new Set();
  while(p&&!seen.has(p)){seen.add(p);const par=char.combos.find(c=>c.id===p);if(!par)break;d++;p=par.parentId;}
  return d;
}
// 親→その子孫…の順（深さ優先）に並べ直し、親と子を必ず隣接させる。
// 兄弟どうしの相対順は現状の配列順を保持する。
function NormalizeComboOrder(arr){
  if(!Array.isArray(arr)||arr.length<2)return arr||[];
  const byId=new Map(arr.map(c=>[c.id,c]));
  const childrenOf=new Map();const roots=[];
  arr.forEach(c=>{
    const pid=c.parentId;
    if(pid!=null&&byId.has(pid)){if(!childrenOf.has(pid))childrenOf.set(pid,[]);childrenOf.get(pid).push(c);}
    else roots.push(c); // 親なし or 親が存在しない(孤立)はルート扱い
  });
  const out=[];const seen=new Set();
  roots.forEach(r=>{
    (function walk(node){
      if(seen.has(node.id))return;seen.add(node.id);out.push(node);
      (childrenOf.get(node.id)||[]).forEach(walk);
    })(r);
  });
  arr.forEach(c=>{if(!seen.has(c.id)){seen.add(c.id);out.push(c);}}); // 取りこぼし防止
  return out;
}
// 親コンボの「すぐ下」に挿入する配列インデックスを返す。
// 親に既存の分岐がある場合は、その分岐グループ（連続する子孫）の末尾の直後に挿入し、グループがひとまとまりになるようにする。
function branchInsertIndex(arr,pid){
  const pi=arr.findIndex(c=>c.id===pid);
  if(pi<0)return arr.length;
  const descSet=new Set(getDesc(pid));
  let ins=pi+1;
  while(ins<arr.length&&descSet.has(arr[ins].id))ins++;
  return ins;
}
function moveCombo(id,dir){
  const char=cur();
  char.combos=NormalizeComboOrder(char.combos); // 親子を隣接させてから処理
  const arr=char.combos;
  const combo=arr.find(c=>c.id===id);if(!combo)return;
  const pid=combo.parentId||null;
  // 同じ親を持つ兄弟（配列順）。この中でのみ入れ替える＝親をまたがない
  const sibs=arr.filter(c=>(c.parentId||null)===pid);
  const si=sibs.findIndex(c=>c.id===id);
  const tj=si+dir;
  if(si<0||tj<0||tj>=sibs.length)return;
  const targetId=sibs[tj].id;
  // 自分・相手それぞれの「サブツリー(本体＋子孫)」をブロックとして丸ごと交換
  const setA=new Set([id,...getDesc(id)]);
  const setB=new Set([targetId,...getDesc(targetId)]);
  const idxA=arr.reduce((a,c,i)=>(setA.has(c.id)&&a.push(i),a),[]);
  const idxB=arr.reduce((a,c,i)=>(setB.has(c.id)&&a.push(i),a),[]);
  const aStart=Math.min(...idxA),aEnd=Math.max(...idxA);
  const bStart=Math.min(...idxB),bEnd=Math.max(...idxB);
  const aElems=arr.slice(aStart,aEnd+1),bElems=arr.slice(bStart,bEnd+1);
  if(aEnd<bStart){
    char.combos=[...arr.slice(0,aStart),...bElems,...arr.slice(aEnd+1,bStart),...aElems,...arr.slice(bEnd+1)];
  }else if(bEnd<aStart){
    char.combos=[...arr.slice(0,bStart),...aElems,...arr.slice(bEnd+1,aStart),...bElems,...arr.slice(aEnd+1)];
  }
  renderCombos();if(activeTab==='tree')renderTree();
}
// コンボIDの採番。Date.now() を直接使うと同一ミリ秒内の連続作成でIDが衝突し、
// parentId参照・getDesc・NormalizeComboOrder が壊れる。全キャラの既存ID（保存/読込/
// インポート分を含む）とセッション内の発行履歴より必ず大きい値を返し、衝突を防ぐ。
let _lastComboId=0;
function genComboId(){
  let mx=_lastComboId;
  try{Object.values((typeof db!=='undefined'&&db.chars)||{}).forEach(ch=>(ch.combos||[]).forEach(c=>{const n=Number(c.id);if(!isNaN(n)&&n>mx)mx=n;}));}catch(e){}
  let t=Date.now();
  if(t<=mx)t=mx+1;
  _lastComboId=t;
  return t;
}
function addCombo(pid=null){const arr=cur().combos;const nc={id:genComboId(),name:pid?t('branchComboDefault'):'NEW COMBO',moves:[],counters:[],tags:[],damage:'',frame:'',parentId:pid,note:''};if(pid==null)arr.push(nc);else arr.splice(branchInsertIndex(arr,pid),0,nc);renderCombos();if(activeTab==='tree')renderTree();}

// ★ コンボの複製。子孫（分岐ツリー）も丸ごと複製し、新IDを採番して親子関係を張り直す。
// 元のサブツリーの直後に、同じ親（=兄弟）として挿入する。似た派生の量産に使う。
function duplicateCombo(id){
  const char=cur();
  char.combos=NormalizeComboOrder(char.combos);
  const arr=char.combos;
  const root=arr.find(c=>c.id===id);if(!root)return;
  const ids=[id,...getDesc(id)]; // DFS順（親が先）
  const idMap=new Map();
  ids.forEach(o=>idMap.set(o,genComboId())); // genComboId は呼ぶたびに単調増加→連番でも衝突しない
  const clones=ids.map(o=>{
    const s=arr.find(c=>c.id===o);const isRoot=(o===id);
    return {id:idMap.get(o),name:s.name+(isRoot?t('copySuffix'):''),moves:[...(s.moves||[])],counters:[...(s.counters||[])],tags:[...(s.tags||[])],damage:s.damage,frame:s.frame||'',dgOverride:(s.dgOverride!=null?s.dgOverride:''),parentId:isRoot?(s.parentId!=null?s.parentId:null):idMap.get(s.parentId),note:s.note||''};
  });
  const subSet=new Set(ids);let lastIdx=-1;arr.forEach((c,i)=>{if(subSet.has(c.id))lastIdx=i;});
  arr.splice(lastIdx+1,0,...clones);
  char.combos=NormalizeComboOrder(arr);
  editingCombos.delete(id); // 複製元（元のコンボ）の編集モードを解除
  editingCombos.add(idMap.get(id)); // 新しく作った複製コンボを編集中にする
  renderCombos();if(activeTab==='tree')renderTree();
  showToast(getDesc(id).length?t('dupWithBranchToast'):t('dupToast'));
}
// 配列 arr の中だけで pid の子孫idを集める（live な char.combos を参照しない版）
function descendantsInArr(arr,pid){
  const out=new Set();const stack=[pid];
  while(stack.length){const p=stack.pop();arr.forEach(c=>{if(c.parentId===p&&!out.has(c.id)){out.add(c.id);stack.push(c.id);}});}
  return out;
}
// ★ コンボの親付け替え。newParentId=null でルート化。循環（子孫を親にする）は禁止。
function reparentCombo(dragId,newParentId){
  const char=cur();
  if(newParentId!=null&&newParentId===dragId)return;
  const combo=char.combos.find(c=>c.id===dragId);if(!combo)return;
  if(newParentId!=null){
    if(!char.combos.find(c=>c.id===newParentId))return;
    if(new Set(getDesc(dragId)).has(newParentId)){showToast(t('cannotParentDesc'),'err');return;}
  }
  if((combo.parentId||null)===(newParentId||null))return; // 変化なし
  char.combos=NormalizeComboOrder(char.combos);
  const subIds=new Set([dragId,...getDesc(dragId)]); // 連れて動くサブツリー
  const block=char.combos.filter(c=>subIds.has(c.id));   // DFS順を保持
  const rest=char.combos.filter(c=>!subIds.has(c.id));
  combo.parentId=newParentId;
  let insAt;
  if(newParentId==null){insAt=rest.length;} // ルート化→末尾へ
  else{
    const pIdx=rest.findIndex(c=>c.id===newParentId);
    const dset=descendantsInArr(rest,newParentId);
    insAt=pIdx+1;while(insAt<rest.length&&dset.has(rest[insAt].id))insAt++; // 新しい親の既存サブツリーの直後
  }
  rest.splice(insAt,0,...block);
  char.combos=NormalizeComboOrder(rest);
  renderCombos();if(activeTab==='tree')renderTree();
  showToast(newParentId==null?t('movedToRoot'):t('parentChanged'));
}
// ★ コンボ間（隙間）へのドロップで並び替え。pos='before'/'after' で参照コンボ refId の
// 直前/直後（refId のサブツリーごと）に dragId のサブツリーを移動し、参照先と同じ親レベルに揃える。
function moveComboRelative(dragId,refId,pos){
  const char=cur();
  if(dragId===refId)return;
  const combo=char.combos.find(c=>c.id===dragId);if(!combo)return;
  const ref=char.combos.find(c=>c.id===refId);if(!ref)return;
  if(new Set(getDesc(dragId)).has(refId)){showToast(t('cannotParentDesc'),'err');return;} // 参照先が自分の子孫＝不可
  char.combos=NormalizeComboOrder(char.combos);
  const subIds=new Set([dragId,...getDesc(dragId)]); // 連れて動くサブツリー
  const block=char.combos.filter(c=>subIds.has(c.id));   // DFS順を保持
  const rest=char.combos.filter(c=>!subIds.has(c.id));
  combo.parentId=(ref.parentId!=null?ref.parentId:null); // 参照先と同じ親レベルへ
  const refIdx=rest.findIndex(c=>c.id===refId);
  let insAt;
  if(refIdx<0){insAt=rest.length;}
  else if(pos==='before'){insAt=refIdx;}
  else{ // after: 参照先サブツリーの直後
    const refDesc=descendantsInArr(rest,refId);
    insAt=refIdx+1;while(insAt<rest.length&&refDesc.has(rest[insAt].id))insAt++;
  }
  rest.splice(insAt,0,...block);
  char.combos=NormalizeComboOrder(rest);
  renderCombos();if(activeTab==='tree')renderTree();
  showToast(t('comboReordered'));
}
// ── 発動条件マーカー（⚡アイコン単体）──
function condMark(m){
  if(!m||!m.condition)return '';
  return `<svg viewBox="0 0 24 24" width="11" height="11" fill="var(--gold)" style="flex-shrink:0;" role="img" aria-label="${esc(t('mCondition'))}"><title>${esc(t('mCondition'))}: ${esc(m.condition)}</title><path d="M13 2 L4 14 H11 L10 22 L20 10 H13 Z"/></svg>`;
}
// ── コンボのコピー（コマンドの値を参照）──
function comboToText(combo){
  const moves=combo.moves||[];
  const parts=[];
  for(let i=0;i<moves.length;i++){
    const m=mv(moves[i]);if(!m)continue;
    const c=(combo.counters&&combo.counters[i])||'';
    const cond=m.condition?`（${m.condition}）`:'';
    const unit=cond+m.inputStr+(c?`(${c})`:'');
    const last=parts[parts.length-1];
    // まとめ表示ON時のみ：連続する同一技（同一ヒット状況）を ×N にまとめる。OFF時は1つずつ（従来通り）。
    if(groupRepeats&&last&&last.mid===moves[i]&&last.ctr===c){last.count++;continue;}
    parts.push({mid:moves[i],ctr:c,unit,count:1});
  }
  return parts.map(p=>p.unit+(p.count>1?`×${p.count}`:'')).join(' ▶ ');
}
function copyCombo(id){
  const char=cur();const combo=(char.combos||[]).find(c=>c.id===id);if(!combo)return;
  const text=comboToText(combo);
  if(!text){showToast(t('noMovesToCopy'),'err');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast(t('copied'))).catch(()=>fallbackCopy(text));
  }else fallbackCopy(text);
}
function fallbackCopy(text){
  try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast(t('copied'));}
  catch(e){showToast(t('copyFail'),'err');}
}

// ── TREE ──
function renderTree(){
  const wrap=document.getElementById('treeViewWrap');wrap.innerHTML='';
  const char=cur();const combos=char.combos||[];
  if(!combos.length){wrap.innerHTML='<div style="color:#7a7a8a;font-size:12px;text-align:center;padding:30px;">'+esc(t('noCombosTree'))+'</div>';return;}
  if(combos.some(c=>c.parentId)){
    const lg=document.createElement('div');lg.className='tree-diff-legend';
    lg.innerHTML=esc(t('treeDiffLabel'))+'<span class="lg-dot"><span class="lg-sw" style="background:var(--bg4);opacity:.6;"></span>'+esc(t('legendCommon'))+'</span><span class="lg-dot"><span class="lg-sw" style="background:#2e1f08;box-shadow:0 0 0 1.5px rgba(244,123,32,.7);"></span>'+esc(t('legendBranch'))+'</span>';
    wrap.appendChild(lg);
  }
  // ヒット状況の凡例（いずれかのコンボで C/PC/D が設定されているときだけ表示）
  if(combos.some(c=>(c.counters||[]).some(x=>x))){
    const lg2=document.createElement('div');lg2.className='tree-diff-legend tree-hit-legend';
    lg2.innerHTML=esc(t('treeHitLabel'))+'<span class="lg-grid"><span class="lg-dot"><span class="ctr-badge ctr-c">C</span>'+esc(t('ctrCounter'))+'</span><span class="lg-dot"><span class="ctr-badge ctr-pc">PC</span>'+esc(t('ctrPunish'))+'</span><span class="lg-dot"><span class="ctr-badge ctr-d">D</span>'+esc(t('ctrDelay'))+'</span><span class="lg-dot"><span class="ctr-badge ctr-g">G</span>'+esc(t('ctrGuard'))+'</span></span>';
    wrap.appendChild(lg2);
  }
  const map={};combos.forEach(c=>{if(c.parentId)return;const k=c.moves[0]||'__none__';if(!map[k])map[k]=[];map[k].push(c);});
  // 親子参照を一度だけ索引化（行ごとの char.combos.filter/find による2乗オーダー走査を回避）
  const _byId=new Map();const _kids=new Map();
  combos.forEach(c=>{_byId.set(c.id,c);const p=c.parentId||null;let a=_kids.get(p);if(!a){a=[];_kids.set(p,a);}a.push(c);});
  const root=document.createElement('div');root.className='tree-root';
  Object.entries(map).forEach(([k,list])=>{
    const sm=mv(k);const s=sm?cs(sm.type):cs('other');
    const block=document.createElement('div');block.className='tree-starter-block';
    block.innerHTML=`<div class="tree-starter-hdr">
      ${sm?(thumbSrc(sm)?`<img src="${thumbSrc(sm)}" style="width:56px;height:32px;border-radius:4px;object-fit:cover;">`:`<div style="min-width:36px;height:20px;border-radius:3px;padding:0 4px;background:${s.bg};color:${s.fg};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;white-space:nowrap;">${sm.inputStr}</div>`):'<div style="width:20px;height:20px;border-radius:3px;background:#222;color:#9a9aa8;display:flex;align-items:center;justify-content:center;font-size:9px;">?</div>'}
      <div><div class="tree-starter-name">${sm?esc(sm.name):esc(t('noStarter'))}</div><div style="font-size:10px;color:${s.fg}">${sm?sm.inputStr:''}</div></div>
      <div style="margin-left:auto;font-size:10px;color:#8e8e9c">${esc(combosUnit(list.length))}</div></div>`;
    const listEl=document.createElement('div');listEl.className='tree-combos';
    function rRow(combo,depth){
      const dg=comboDG(combo);const dgManual=comboDGManual(combo);const children=_kids.get(combo.id)||[];
      const row=document.createElement('div');row.className='tree-combo-row';row.style.marginLeft=(depth*20)+'px';
      // ★ 分岐コンボは親と比較し、共通部分=淡色 / 分岐後=ゴールド、分岐点に ⑂ を表示
      const parent=combo.parentId?_byId.get(combo.parentId):null;
      let divergeIdx=-1;
      if(parent){divergeIdx=(combo.moves||[]).length;for(let i=0;i<(combo.moves||[]).length;i++){if(i>=parent.moves.length||combo.moves[i]!==parent.moves[i]){divergeIdx=i;break;}}}
      const hasDiverged=!!parent&&divergeIdx<(combo.moves||[]).length; // 分岐後の固有技があるときだけ色分け
      const parts=[];const chipMids=[]; // チップと技IDの対応（クリックで詳細表示するため）
      ensureCounters(combo); // ヒット状況の並行配列を技数に揃える
      // ★ まとめ表示ON時は連続する同一技（ヒット状況・共通/分岐区分が同じ）を ×N にまとめる。ツリーは常に閲覧用なので編集状態に関係なく適用。
      const _units=[];
      (combo.moves||[]).forEach((mid,idx)=>{
        if(!mv(mid))return;
        const common=hasDiverged&&idx<divergeIdx;
        const branch=hasDiverged&&idx>=divergeIdx;
        const ctr=(combo.counters&&combo.counters[idx])||'';
        const last=_units[_units.length-1];
        if(groupRepeats&&last&&last.mid===mid&&last.ctr===ctr&&last.common===common&&last.branch===branch&&!(hasDiverged&&idx===divergeIdx)){last.count++;}
        else{_units.push({mid,startIdx:idx,count:1,ctr,common,branch});}
      });
      _units.forEach(u=>{
        const m=mv(u.mid);if(!m)return;const sm2=cs(m.type);const idx=u.startIdx;
        if(parts.length>0){
          if(hasDiverged&&idx===divergeIdx)parts.push('<span class="branch-split-sep" style="font-size:10px;">⑂</span>');
          else parts.push('<span class="arrow-sep" style="font-size:10px;">▶</span>');
        }else if(hasDiverged&&divergeIdx===0&&idx===0){parts.push('<span class="branch-split-sep" style="font-size:10px;">⑂</span>');}
        const cls='tree-move-chip'+(u.common?' tmc-common':'')+(u.branch?' tmc-branch':'');
        const cm=u.ctr?ctrMeta(u.ctr):null;
        const badge=cm?`<span class="tree-chip-ctr ${cm.cls}" title="${cm.title}">${cm.label}</span>`:'';
        const xN=u.count>1?`<span class="rep-x">×${u.count}</span>`:'';
        parts.push(`<span class="${cls}" style="background:${sm2.bg};color:${sm2.fg};" title="${esc(t('chipDetailTitle'))}">${esc(m.name)}${xN}${badge}</span>`);
        chipMids.push(u.mid);
      });
      const mvHtml=parts.join('');
      const tagsHtml=(combo.tags||[]).map((t)=>{const tc=tagColor(t);return`<span class="tree-tag" style="background:${tc.bg};color:${tc.fg};">${esc(t)}</span>`;}).join('');
      row.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;margin-right:8px;flex-shrink:0;"><div class="tree-dot"></div>${children.length?'<div class="tree-line"></div>':''}</div>
      <div class="tree-combo-content">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;"><div class="tree-combo-name">${esc(combo.name)}</div>${tagsHtml}</div>
        <div class="tree-combo-moves">${mvHtml||'<span style="color:#6f6f82;font-size:10px;">'+esc(t('noMovesTree'))+'</span>'}</div>
        <div class="tree-combo-meta">${combo.damage?`<div class="tree-meta-item">DMG: <span>${combo.damage}</span></div>`:''}
          ${combo.frame?`<div class="tree-meta-item">${esc(t('frameLabel'))}: <span>${esc(fmtFrame(combo.frame))}</span></div>`:''}
          <div class="tree-meta-item dg">DG: <span>${barsTxt(dg)}${dgManual?' ✎':''}</span></div>
          ${combo.note?`<div class="tree-meta-item" style="color:#9a9aa8;font-size:10px;">${esc(combo.note)}</div>`:''}
        </div>
      </div>`;
      // ★ STARTER TREE でも技チップのクリックで詳細モーダルを表示（COMBO LIST と同様）
      row.querySelectorAll('.tree-move-chip').forEach((el,i)=>{const _mid=chipMids[i];el.addEventListener('click',ev=>{ev.stopPropagation();showMoveModal(_mid);});});
      listEl.appendChild(row);children.forEach(ch=>rRow(ch,depth+1));
    }
    list.forEach(c=>rRow(c,0));block.appendChild(listEl);root.appendChild(block);
  });
  wrap.appendChild(root);
}

    <div class="form-row" style="grid-template-columns:1fr 1fr;"><div class="form-group"><label class="form-label">${esc(t('fCategory'))}</label><select class="form-inp" id="fi-type">${catOpts}</select></div><div class="form-group"><label class="form-label">${esc(t('fCommand'))}</label><input class="form-inp" id="fi-inp" value="${esc(d.inputStr)}" placeholder="${esc(t('fCommandPh'))}"></div></div>
    <div class="form-group"><label class="form-label">${esc(t('fCondition'))}</label><input class="form-inp" id="fi-cond" value="${esc(d.condition||'')}" placeholder="${esc(t('fConditionPh'))}"></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr;"><div class="form-group"><label class="form-label">${esc(t('fDamage'))}</label><input class="form-inp" type="number" id="fi-dmg" value="${d.damage}"></div><div class="form-group"><label class="form-label">${esc(t('fDgCost'))}</label><input class="form-inp" type="number" id="fi-dg" value="${d.dgCost||0}" min="0" max="6" step="0.5"></div></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;"><div class="form-group"><label class="form-label">${esc(t('fStartup'))}</label><input class="form-inp" id="fi-s" value="${d.startup}"></div><div class="form-group"><label class="form-label">${esc(t('fActive'))}</label><input class="form-inp" id="fi-a" value="${d.active}"></div><div class="form-group"><label class="form-label">${esc(t('fRecovery'))}</label><input class="form-inp" id="fi-r" value="${d.recovery}"></div></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;"><div class="form-group"><label class="form-label">${esc(t('fOnHit'))}</label><input class="form-inp" id="fi-oh" value="${d.onHit}"></div><div class="form-group"><label class="form-label">${esc(t('fOnBlock'))}</label><input class="form-inp" id="fi-ob" value="${d.onBlock}"></div><div class="form-group"><label class="form-label">${esc(t('fCancel'))}</label><input class="form-inp" id="fi-cancel" value="${d.cancel}" placeholder="${esc(t('fCancelPh'))}"></div></div>
    <div class="form-group"><label class="form-label">${esc(t('fNotes'))}</label><input class="form-inp" id="fi-notes" value="${esc(d.notes||'')}"></div>
    <div class="form-group">
      <label class="form-label">${esc(t('fThumb'))}</label>
      <div class="thumb-wrap" id="thumbWrap" onclick="document.getElementById('thumbUp').click()" style="border-style:${thumbSrc(d)?'solid':'dashed'}">
        ${thumbSrc(d)?`<img src="${thumbSrc(d)}">`:'<div class="thumb-ph">'+esc(t('thumbPh'))+'</div>'}
      </div>
      <input type="file" id="thumbUp" accept="image/*" style="display:none">
      <div id="clrSlot" style="margin-top:4px;">${d.thumb?'<button class="btn danger" style="font-size:10px;" onclick="clearThumb(event)">'+esc(t('delImage'))+'</button>':''}</div>
    </div>
    <div class="sep"></div>
    <div class="flex-btns">
      <button class="close-btn" onclick="closeModal()">${t('cancel')}</button>
      <button class="close-btn" style="border-color:var(--gold);color:var(--gold);" onclick="saveMove('${editId||''}')">${t('save')}</button>
      ${editId?`<button class="close-btn danger" style="border-color:#5a1a1a;color:#ff6666;" onclick="deleteMove('${editId}')">${t('del')}</button>`:''}
    </div>`);
  document.getElementById('thumbUp').addEventListener('change',ev=>{
    const f=ev.target.files[0];if(!f)return;
    // base64化せず、選択されたファイル(Blob)をそのまま保持する。保存時にIDBへ書き込む。
    ev.target._blob=f;ev.target._c=false;
    if(ev.target._prevURL)URL.revokeObjectURL(ev.target._prevURL);
    const url=URL.createObjectURL(f);ev.target._prevURL=url;
    const w=document.getElementById('thumbWrap');w.style.borderStyle='solid';w.innerHTML=`<img src="${url}">`;
    const sl=document.getElementById('clrSlot');if(sl)sl.innerHTML='<button class="btn danger" style="font-size:10px;" onclick="clearThumb(event)">'+esc(t('delImage'))+'</button>';
  });
}
function clearThumb(e){if(e)e.stopPropagation();const w=document.getElementById('thumbWrap');w.style.borderStyle='dashed';w.innerHTML='<div class="thumb-ph">'+esc(t('thumbPh'))+'</div>';const u=document.getElementById('thumbUp');if(u._prevURL){URL.revokeObjectURL(u._prevURL);u._prevURL=null;}u._blob=null;u._c=true;document.getElementById('clrSlot').innerHTML='';}
async function saveMove(editId){
  const char=cur();
  const id=editId||(Date.now().toString(36));
  const imgKey=db.currentChar+'_'+id; // 画像キーは「キャラID_技ID」で一意（再保存で上書き）
  const u=document.getElementById('thumbUp');
  // 画像の確定: 削除指定 / 新規Blob / 変更なし の3通り。
  let thumb;
  if(u&&u._c){ // 画像を削除
    thumb=null;
    try{await idbDeleteImage(imgKey);}catch(e){}
    if(thumbURLs.has(imgKey)){URL.revokeObjectURL(thumbURLs.get(imgKey));thumbURLs.delete(imgKey);}
  }else if(u&&u._blob){ // 新しい画像をIDBへ保存
    try{await idbPutImage(imgKey,u._blob);}catch(e){showToast(t('imgSaveFail')+e.message,'err');}
    if(thumbURLs.has(imgKey))URL.revokeObjectURL(thumbURLs.get(imgKey));
    thumbURLs.set(imgKey,URL.createObjectURL(u._blob));
    thumb=imgKey;
  }else{ // 変更なし: 既存の参照を維持（キー / 旧形式data: / null）
    const ex=editId?char.moves.find(m=>m.id===editId):null;
    thumb=ex?ex.thumb:null;
  }
  if(u&&u._prevURL){URL.revokeObjectURL(u._prevURL);u._prevURL=null;}
  const pn=v=>{const n=parseFloat(v);return isNaN(n)?v:n;};
  const mv2={
    id:id,name:document.getElementById('fi-name').value||t('newMoveDefault'),
    type:document.getElementById('fi-type').value,
    inputStr:document.getElementById('fi-inp').value||'',startup:pn(document.getElementById('fi-s').value),
    active:document.getElementById('fi-a').value,recovery:document.getElementById('fi-r').value,
    onHit:pn(document.getElementById('fi-oh').value),onBlock:pn(document.getElementById('fi-ob').value),
    damage:pn(document.getElementById('fi-dmg').value)||0,cancel:document.getElementById('fi-cancel').value||'-',
    notes:document.getElementById('fi-notes').value||'',dgCost:parseFloat(document.getElementById('fi-dg').value)||0,thumb,
    condition:(document.getElementById('fi-cond')?document.getElementById('fi-cond').value:'')||'',
  };
  if(editId){const i=char.moves.findIndex(m=>m.id===editId);if(i>=0)char.moves[i]=mv2;}
  else char.moves.push(mv2);
  closeModal();render();
}
function deleteMove(id){
  const char=cur();
  const target=char.moves.find(m=>m.id===id);
  if(target&&isImgKey(target.thumb)){
    try{idbDeleteImage(target.thumb);}catch(e){}
    if(thumbURLs.has(target.thumb)){URL.revokeObjectURL(thumbURLs.get(target.thumb));thumbURLs.delete(target.thumb);}
  }
  char.moves=char.moves.filter(m=>m.id!==id);
  char.combos.forEach(c=>{ensureCounters(c);const nm=[],nc=[];c.moves.forEach((m,i)=>{if(m!==id){nm.push(m);nc.push(c.counters[i]||'');}});c.moves=nm;c.counters=nc;});
  closeModal();render();
}

function openRenameCharModal(){

  const name=document.getElementById('rc-name').value.trim();if(!name)return;
