  closeModal();render();
}
// 全キャラ共通の技プリセット（新規キャラ追加時に任意で呼び出す）。
// 通称（技名カッコ内）・フレーム・ダメージはキャラ依存のため空欄。inputStr/種別のみ設定。
function presetMoves(){
  const blank={startup:'',active:'',recovery:'',onHit:'',onBlock:'',damage:'',cancel:'',notes:'',thumb:null,condition:''};
  const defs=[]; // [name, inputStr, type, dgCost]
  // 立ち / しゃがみ / ジャンプ の 弱中強 P・K（各6種）
  [['立ち','','Normal'],['しゃがみ','↓＋','Normal'],['ジャンプ','（J中）','jump']].forEach(([pre,ipre,ty])=>{
    ['弱','中','強'].forEach(st=>['P','K'].forEach(b=>defs.push([pre+st+b, ipre+st+b, ty, 0])));
  });
  // 投げ・ドライブ系（ドライブ系はゲージ消費(DG)を設定）
  [
    ['前投げ','投げ','throw',0],
    ['後ろ投げ','←＋投げ','throw',0],
    ['ドライブインパクト','インパクト','drive',1],
    ['ドライブリバーサル','→＋インパクト','drive',2],
    ['パリィドライブラッシュ','ドライブラッシュ','drive',0.5],
    ['キャンセルドライブラッシュ','キャンセルラッシュ','drive',3],
  ].forEach(d=>defs.push(d));
  // 移動系（ステップ2・歩き2・各方向ジャンプ3）= その他(other)
  [
    ['前ステップ','→→','other',0],
    ['後方ステップ','←←','other',0],
    ['前歩き','→','other',0],
    ['後ろ歩き','←','other',0],
    ['垂直ジャンプ','↑','other',0],
    ['前ジャンプ','↗','other',0],
    ['後ろジャンプ','↖','other',0],
  ].forEach(d=>defs.push(d));
  return defs.map((d,i)=>({id:'p'+String(i+1).padStart(4,'0'),name:d[0],inputStr:d[1],type:d[2],dgCost:d[3],...blank}));
}
let _pendingCharName='';
function saveChar(){
  const name=document.getElementById('ci-name').value.trim();if(!name)return;
  _pendingCharName=name; // モーダル差し替えで入力欄が消えるため名前を保持
  // ネイティブ confirm はサンドボックス iframe(Claude等)で無効化されるため、アプリ内モーダルで確認する
  showModal(`<div class="modal-title-bar">${t('presetTitle')}</div>
    <div style="font-size:12px;color:var(--muted);line-height:1.7;white-space:pre-line;margin-bottom:12px;">${esc(t('presetConfirm'))}</div>
    <div class="flex-btns">
      <button class="close-btn" onclick="createCharFromPending(false)">${t('presetNo')}</button>
      <button class="close-btn" style="border-color:var(--gold);color:var(--gold);" onclick="createCharFromPending(true)">${t('presetYes')}</button>
    </div>`);
}
function createCharFromPending(withPreset){
  const name=_pendingCharName;if(!name)return;
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_')+Date.now();
  db.chars[id]={name:name.toUpperCase(),moves:withPreset?presetMoves():[],combos:[],tags:['SA1','SA2','SA3','パニカン','カウンター','中央','画面端']};
  db.currentChar=id;activeTag='ALL';activeSort='ALL';_pendingCharName='';closeModal();render();
}
function deleteCurrentChar(){
  const ids=Object.keys(db.chars);if(ids.length<=1){showToast(t('cannotDelLastChar'),'err');return;}
  const msg=LANG==='ja'?`「${cur().name}」を削除しますか？\nこのキャラのコンボ・技・メモがすべて削除されます。`:`Delete "${cur().name}"?\nAll combos, moves and memos for this character will be removed.`;
  showModal(`<div class="modal-title-bar">${t('delCharTitle')}</div>
    <div style="font-size:13px;color:var(--text);line-height:1.7;white-space:pre-line;margin-bottom:12px;">${esc(msg)}</div>
    <div class="flex-btns">
      <button class="close-btn" onclick="closeModal()">${t('cancel')}</button>
      <button class="close-btn" style="border-color:#ff4444;color:#ff6666;background:#2a1414;" onclick="confirmDeleteChar()">${t('delCharConfirm')}</button>
    </div>`);
}
function confirmDeleteChar(){
  const ids=Object.keys(db.chars);if(ids.length<=1){closeModal();return;}
  delete db.chars[db.currentChar];db.currentChar=Object.keys(db.chars)[0];activeTag='ALL';activeSort='ALL';closeModal();render();
}
function switchChar(id){endAddMode();editingCombos.clear();db.currentChar=id;activeTag='ALL';activeSort='ALL';render();}
// モバイル：ヘッダーの操作ボタン群を折りたたみ/展開
function toggleTopbarMenu(){
  const tb=document.getElementById('topbar');if(!tb)return;
  const collapsed=tb.classList.toggle('acts-collapsed');
  const a=document.getElementById('menuArrow');if(a)a.textContent=collapsed?'▾':'▴';

// ── TAG MODAL ──
function openAddTagModal(){
  showModal(`<div class="modal-title-bar">${t('tagMgmtTitle')}</div>
    <div class="form-group"><label class="form-label">${esc(t('tagName'))}</label><input class="form-inp" id="ti-name" placeholder="${esc(t('tagNamePh'))}"></div>
    <div style="margin-bottom:10px;"><div class="form-label" style="margin-bottom:6px;">${esc(t('currentTags'))}</div><div id="tagList" style="display:flex;flex-wrap:wrap;gap:5px;"></div></div>
    <div class="flex-btns"><button class="close-btn" onclick="closeModal()">${t('close')}</button><button class="close-btn" style="border-color:var(--gold);color:var(--gold);" onclick="saveTag()">${t('add')}</button></div>`);
  renderTagList();
}
function renderTagList(){
  const tl=document.getElementById('tagList');if(!tl)return;
  tl.innerHTML=(cur().tags||[]).map((t)=>{const tc=tagColor(t);return`<span style="background:${tc.bg};color:${tc.fg};font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;" onclick="deleteTag('${esc(t)}')">${esc(t)} ✕</span>`;}).join('');
}
function saveTag(){const v=document.getElementById('ti-name').value.trim();if(!v)return;const char=cur();if(!char.tags)char.tags=[];if(!char.tags.includes(v))char.tags.push(v);document.getElementById('ti-name').value='';renderTagList();renderFilterBar();}
function deleteTag(tag){const char=cur();char.tags=char.tags.filter(t=>t!==tag);char.combos.forEach(c=>{c.tags=c.tags.filter(t=>t!==tag);});if(activeTag===tag)activeTag='ALL';renderTagList();renderFilterBar();renderCombos();}

// ── BRANCH MODAL ──
function openBranchModal(parentId){
  const char=cur();const parent=char.combos.find(c=>c.id===parentId);if(!parent)return;
  const children=char.combos.filter(c=>c.parentId===parentId);
  const childrenHtml=children.length?children.map(c=>`<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;display:flex;align-items:center;gap:8px;margin-bottom:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;"></span><span style="flex:1;font-size:12px;">${esc(c.name)}</span><button class="btn danger" style="font-size:10px;padding:2px 6px;" onclick="delBranch(${c.id})">${t('del')}</button></div>`).join(''):'<div style="color:#7a7a8a;font-size:11px;padding:6px;">'+esc(t('noBranches'))+'</div>';
  showModal(`<div class="modal-title-bar">${t('branchMgmtTitle')} — ${esc(parent.name)}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${esc(t('branchMgmtDesc'))}</div>
    <div style="margin-bottom:10px;">${childrenHtml}</div>
    <button class="btn gold" style="width:100%;padding:8px;" onclick="addBranch(${parentId})">${t('addBranchCombo')}</button>
    <button class="close-btn" onclick="closeModal()">${t('close')}</button>`);
}
function addBranch(pid){
  const char=cur();const p=char.combos.find(c=>c.id===pid);
  const branch={id:genComboId(),name:(p?p.name:'')+t('branchSuffix'),moves:p?[...p.moves]:[],counters:p?[...(p.counters||[])]:[],tags:p?[...(p.tags||[])]:[], damage:'',frame:'',parentId:pid,note:''};
  char.combos.splice(branchInsertIndex(char.combos,pid),0,branch);
  editingCombos.delete(pid); // 分岐元（元のコンボ）の編集モードを解除
  editingCombos.add(branch.id); // 新しく作った分岐コンボを編集中にする
  closeModal();renderCombos();if(activeTab==='tree')renderTree();showToast(t('branchAddedToast'));
}
function delBranch(id){
  const char=cur();const ids=getDesc(id);char.combos=char.combos.filter(c=>!ids.includes(c.id)&&c.id!==id);
  closeModal();renderCombos();if(activeTab==='tree')renderTree();
}

// ── MODAL HELPERS ──
function showModal(html){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">${html}</div></div>`;
  root.querySelector('#mbg').addEventListener('click',e=>{if(e.target===root.querySelector('#mbg'))closeModal();});
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

// ── ドラッグ中のマウスホイールスクロール ──
// コンボ（または技カード）を掴んで移動している間、ネイティブD&D中でも
// マウスホイールでスクロールコンテナ（コンボ一覧／技一覧／ツリー）を上下スクロールできるようにする。
function _findScrollableAncestor(el){
  while(el&&el!==document.body&&el!==document.documentElement){
    if(el.scrollHeight>el.clientHeight+1){
      const oy=getComputedStyle(el).overflowY;
      if(oy==='auto'||oy==='scroll')return el;
    }
    el=el.parentElement;
  }
  return null;
}
function setupDragWheelScroll(){
  window.addEventListener('wheel',e=>{
    const dragging=(comboDragId!=null)||(dragSrc&&dragSrc.type!=null);
    if(!dragging)return;
    const under=document.elementFromPoint(e.clientX,e.clientY);
    const sc=_findScrollableAncestor(under)||document.querySelector('.combo-scroll');
    if(!sc)return;
    sc.scrollTop+=e.deltaY;
    e.preventDefault();
  },{passive:false});
}

// ── INIT ──
document.documentElement.lang=LANG;
applyStaticI18n();
applyCompactMoves();
setupDragWheelScroll();
autoScale();render();
